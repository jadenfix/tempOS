name: PR Governance

# Enforces the multi-agent contribution contract (AGENTS.md → "Multi-Agent
# Contribution & Review Contract") with checks that run OUTSIDE any agent's
# judgement — mirroring beaterOS's "policy outside the model" principle
# (final.md §8.12). This is the CI workflow the review gate in
# docs/governance/README.md expects to "call" the ledger linter.
#
# What it CAN check (structural, deterministic):
#   - the PR body contains the agent-routing trailer
#   - Author-Agent is filled in (not the placeholder)
#   - Merged-By does not declare a self-merge (Merged-By == Author-Agent)
#   - the review/merge ledger passes scripts/check-governance.py
#
# What it CANNOT check (honesty boundary): whether the declared agent ids are
# truthful. All agents act as the same GitHub account, so identity here is
# attested, not cryptographically verified.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  # Fires after a PR closes so we can record who actually merged it. Uses
  # pull_request_target because a merged PR's head may be deleted; this job
  # runs no PR-authored code and only reads event metadata + comments.
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: read

jobs:
  routing:
    name: Agent routing + no self-merge
    # Pre-merge structural check. Only on pull_request (not the _target close).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint review/merge ledger (no self-merge / no self-review)
        run: |
          ledger="docs/governance/coordination-ledger.md"
          if [ -f "$ledger" ]; then
            python3 scripts/check-governance.py "$ledger"
          else
            echo "::warning::$ledger not present on this branch — skipping ledger lint. Rebase onto main to pick up the review gate."
          fi

      - name: Validate agent-routing trailer
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const fail = (msg) => core.setFailed(msg);
            const problems = [];

            // Extract "Key: value" from the routing trailer, case-insensitive.
            const field = (name) => {
              const m = body.match(new RegExp("^\\s*" + name + "\\s*:\\s*(.+?)\\s*$", "im"));
              return m ? m[1].trim() : null;
            };

            const author = field("Author-Agent");
            const reviewer = field("Reviewer-Agent");
            const mergedBy = field("Merged-By");

            const isPlaceholder = (v) =>
              !v || /^<.*>$/.test(v) || v.toLowerCase() === "pending";

            if (author === null && reviewer === null && mergedBy === null) {
              problems.push(
                "Missing agent-routing trailer. Add the block from AGENTS.md " +
                "(Multi-Agent Contribution & Review Contract → Agent routing trailer):\n" +
                "  Author-Agent: <agent-id>\n" +
                "  Reviewer-Agent: <agent-id or \"pending\">\n" +
                "  Merged-By: <agent-id / \"human:@handle\" / \"pending\">"
              );
            }

            if (isPlaceholder(author)) {
              problems.push("Author-Agent must be filled in (not a placeholder).");
            }

            const sameAgent = (a, b) =>
              a && b && a.toLowerCase() === b.toLowerCase();

            // Self-merge guard: fails when Merged-By is concrete AND equals Author.
            if (
              !isPlaceholder(author) && !isPlaceholder(mergedBy) &&
              sameAgent(author, mergedBy)
            ) {
              problems.push(
                `Self-merge declared: Merged-By ("${mergedBy}") equals Author-Agent ` +
                `("${author}"). Per AGENTS.md, the author must never merge their own PR — ` +
                `hand off to a different agent or the human owner.`
              );
            }

            // FAIL CLOSED once the PR is ready for review (not a draft): a ready
            // PR must declare a concrete Reviewer-Agent distinct from the author.
            // While the PR is a draft, a "pending" reviewer is allowed (review
            // happens after ready). This is the pre-merge gate: under branch
            // protection requiring this check, a ready PR cannot merge without a
            // declared non-author reviewer. The residual limit (that the declared
            // id's truthfulness can't be verified under one shared account) is the
            // documented honesty boundary — this closes the *structural* hole.
            if (pr.draft === false) {
              if (isPlaceholder(reviewer)) {
                problems.push(
                  "Ready PR (not a draft) must declare a concrete Reviewer-Agent " +
                  "(not \"pending\"). The evidence that proves review is a COMMENT " +
                  "review + a coordination-ledger row by a DIFFERENT agent-id than " +
                  "Author-Agent. Mark back to draft until an independent agent has " +
                  "reviewed."
                );
              } else if (sameAgent(reviewer, author)) {
                problems.push(
                  `Self-review declared: Reviewer-Agent ("${reviewer}") equals ` +
                  `Author-Agent ("${author}"). Review must be performed by a ` +
                  `different agent.`
                );
              }
            }

            // Nudge (not a failure) if review routing checklist is absent.
            if (!/review routing/i.test(body)) {
              core.warning(
                "No 'Review routing' section found. Confirm an independent agent " +
                "will review and a non-author will merge (see AGENTS.md → " +
                "Multi-Agent Contribution & Review Contract)."
              );
            }

            if (problems.length) {
              fail("PR governance check failed:\n- " + problems.join("\n- "));
            } else {
              core.info(
                "Agent routing OK.\n" +
                `  Author-Agent:   ${author || "(unset)"}\n` +
                `  Reviewer-Agent: ${reviewer || "(unset)"}\n` +
                `  Merged-By:      ${mergedBy || "(unset)"}\n` +
                "Reminder: identity is attested, not verified (see the honesty " +
                "boundary in AGENTS.md → Multi-Agent Contribution & Review Contract)."
              );
            }

  merge-receipt:
    name: Record real merger (receipt)
    # Runs only when a PR is actually merged. Records who clicked merge as a
    # durable receipt (AGENTS.md §7 / final.md §4.5, §7.6). Cannot separate
    # agent-ids under one account, but captures the real GitHub actor.
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Post merge receipt
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const field = (name) => {
              const m = body.match(new RegExp("^\\s*" + name + "\\s*:\\s*(.+?)\\s*$", "im"));
              return m ? m[1].trim() : "(unset)";
            };
            const author = field("Author-Agent");
            const merger = (pr.merged_by && pr.merged_by.login) || "(unknown)";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body:
                "🧾 **Merge receipt** (auto, `pr-governance.yml`)\n\n" +
                "- Declared `Author-Agent`: `" + author + "`\n" +
                "- Real GitHub merger: `@" + merger + "`\n\n" +
                "_This records the actual merger for the audit trail. It cannot " +
                "distinguish agent-ids under one shared account — agent identity " +
                "is attested, not verified (see AGENTS.md → Multi-Agent " +
                "Contribution & Review Contract)._"
            });
